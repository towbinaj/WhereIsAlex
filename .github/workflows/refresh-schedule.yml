name: Refresh schedule

# Rebuilds schedule.json from the QGenda (and any future) calendar feeds and
# commits it back — but only when the schedule actually changed, so the history
# isn't spammed with timestamp-only commits.

on:
  schedule:
    # Target: noon & midnight US Eastern. Cron is UTC and can't follow DST, so
    # we fire at both the EST and EDT candidate hours (00/12 ET is 04/05 & 16/17
    # UTC) and a guard below drops the two that aren't actually noon/midnight ET.
    - cron: "0 4,5,16,17 * * *"
  workflow_dispatch: {}  # manual "Run workflow" button in the Actions tab

permissions:
  contents: write

concurrency:
  group: refresh-schedule
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Skip scheduled runs that aren't noon/midnight Eastern
        if: github.event_name == 'schedule'
        run: |
          H=$(TZ=America/New_York date +%H)
          if [ "$H" != "00" ] && [ "$H" != "12" ]; then
            echo "Eastern hour is $H — not noon/midnight, skipping."
            echo "skip=true" >> "$GITHUB_ENV"
          fi

      - name: Rebuild schedule.json and commit only on data change
        if: env.skip != 'true'
        run: |
          set -euo pipefail
          # Hash the schedule (ignoring the _generatedAt timestamp) before…
          before=$(jq -Sc '.days' schedule.json | sha256sum | cut -d' ' -f1)

          node scripts/build-schedule.js

          # …and after the rebuild.
          after=$(jq -Sc '.days' schedule.json | sha256sum | cut -d' ' -f1)

          if [ "$before" = "$after" ]; then
            echo "No schedule changes — discarding timestamp-only update."
            git checkout -- schedule.json
            exit 0
          fi

          echo "Schedule changed — committing refreshed schedule.json."
          git config user.name  "whereisalex-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add schedule.json
          git commit -m "chore: refresh schedule.json [skip ci]"
          git push
