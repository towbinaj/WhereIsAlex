<svg width="1024" height="1024" viewBox="0 0 180 180" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Where's Alex">
  <!-- Opaque "chip" source for iOS home-screen / PWA icons (iOS masks the
       corners itself). Rasterized to apple-touch-icon.png / icon-*.png.
       The browser-tab favicon uses the transparent favicon.svg instead. -->
  <defs>
    <linearGradient id="pinGradient" gradientUnits="userSpaceOnUse" x1="3" y1="6" x2="61" y2="58">
      <stop offset="0%" stop-color="#D54070"/>
      <stop offset="16.6%" stop-color="#8F4469"/>
      <stop offset="33.2%" stop-color="#CA5699"/>
      <stop offset="49.8%" stop-color="#59B8DA"/>
      <stop offset="66.4%" stop-color="#9AD0DD"/>
      <stop offset="83%" stop-color="#73B44A"/>
      <stop offset="100%" stop-color="#9AC449"/>
    </linearGradient>
  </defs>
  <rect width="180" height="180" fill="#FBFBF9"/>
  <g transform="translate(19.6,19.6) scale(2.2)">
    <path fill-rule="evenodd" fill="url(#pinGradient)"
          d="M32 4 C17 4 5 16 5 31 C5 52 32 60 32 60 C32 60 59 52 59 31 C59 16 47 4 32 4 Z
             M43 30 A11 11 0 1 0 21 30 A11 11 0 1 0 43 30 Z"/>
  </g>
</svg>
