             M57 38 A15 15 0 1 0 27 38 A15 15 0 1 0 57 38 Z"/>
  </g>

  <!-- Wordmark (solid SPARK sky-blue) -->
  <text x="104" y="80"
        font-family="Inter, 'IBM Plex Sans', Helvetica, Arial, sans-serif"
        font-size="66" font-weight="700" letter-spacing="-1"
        fill="#59B8DA">Where's Alex</text>
</svg>
