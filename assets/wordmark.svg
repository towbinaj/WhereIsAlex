<svg width="513" height="120" viewBox="0 0 513 120" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Where's Alex">
  <defs>
    <!-- True 42° gradient axis (user-space vector spanning the pin) -->
    <linearGradient id="brandGradient" gradientUnits="userSpaceOnUse" x1="-3" y1="12" x2="87" y2="94">
      <stop offset="0%" stop-color="#D54070"/>
      <stop offset="16.6%" stop-color="#8F4469"/>
      <stop offset="33.2%" stop-color="#CA5699"/>
      <stop offset="49.8%" stop-color="#59B8DA"/>
      <stop offset="66.4%" stop-color="#9AD0DD"/>
      <stop offset="83%" stop-color="#73B44A"/>
      <stop offset="100%" stop-color="#9AC449"/>
    </linearGradient>
  </defs>

  <!-- Pin logomark (gradient) -->
  <g transform="translate(6,8)">
    <path d="M42 2 C22 2 6 18 6 38 C6 66 42 104 42 104 C42 104 78 66 78 38 C78 18 62 2 42 2 Z"
          fill="url(#brandGradient)"/>
